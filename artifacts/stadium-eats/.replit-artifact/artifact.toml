kind = "web"
previewPath = "/"
title = "Stadium Eats"
version = "1.0.0"
id = "artifacts/stadium-eats"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23447

[services.development]
run = "pnpm --filter @workspace/stadium-eats run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/stadium-eats", "run", "build" ]
publicDir = "artifacts/stadium-eats/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23447"
BASE_PATH = "/"
